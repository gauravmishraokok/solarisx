version: "3.9"
services:

  neo4j:
    image: neo4j:5.25
    environment:
      NEO4J_AUTH: neo4j/memorapass
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  neo4jdata:
